    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <title>NurseHub Egypt | منصة تعليم التمريض</title>
  </head>
  <body>
    <div id="root">
      <!-- Splash screen shows while React loads -->
      <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0284c7,#14b8a6);z-index:9999;transition:opacity 0.3s">
        <div style="text-align:center;color:white">
          <div style="width:80px;height:80px;margin:0 auto 16px;border-radius:20px;background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 40px rgba(0,0,0,0.2)">
            <svg width="50" height="50" viewBox="0 0 48 48" fill="none">
              <path d="M24 41c-1 0-1.9-.5-2.5-1.2C17 34.4 9 30 9 21.5 9 16.8 12.6 13 17.2 13c2.9 0 5.4 1.5 6.8 3.8C25.4 14.5 27.9 13 30.8 13 35.4 13 39 16.8 39 21.5c0 .9-.1 1.7-.3 2.5" stroke="#0284c7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="rgba(2,132,199,0.14)"/>
              <path d="M14 12v6a6 6 0 0 0 12 0v-4" stroke="#0284c7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="14" cy="10.5" r="2" fill="#0284c7"/>
              <circle cx="26" cy="10.5" r="2" fill="#0284c7"/>
              <circle cx="35.5" cy="27.5" r="4.2" fill="#0284c7"/>
              <path d="M24 22.5v5M21.5 25h5" stroke="#0284c7" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </div>
          <div style="font-family:'Cairo',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.5px">NurseHub <span style="color:#0ea5e9">Egypt</span></div>
          <div style="font-family:'Cairo',sans-serif;font-size:12px;opacity:0.9;margin-top:4px">منصة تعليم التمريض</div>
          <div style="margin-top:20px;display:flex;justify-content:center;gap:6px">
            <div style="width:8px;height:8px;border-radius:50%;background:white;animation:bounce 1s infinite 0s"></div>
            <div style="width:8px;height:8px;border-radius:50%;background:white;animation:bounce 1s infinite 0.2s"></div>
            <div style="width:8px;height:8px;border-radius:50%;background:white;animation:bounce 1s infinite 0.4s"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Hide splash when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(function() { splash.style.display = 'none'; }, 300);
          }
        }, 800);
      });
      // Global error handler for production debugging
      window.addEventListener('error', function(e) {
        console.error('[NurseHub Error]', e.message, e.filename, e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[NurseHub Promise Error]', e.reason);
      });
    </script>
    <style>
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-8px); opacity: 1; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
